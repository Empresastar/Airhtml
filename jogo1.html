    <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alien Escape: jogo1</title>
    <style>
        :root { --bg: #0f0524; --primary: #a2ff00; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        #game-container { position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/9; background: black; border-radius: 12px; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 20; }
        .btn { padding: 15px 30px; background: var(--primary); color: black; font-weight: bold; border-radius: 50px; border: none; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
        <h1 id="msg">PLANET ESCAPE</h1>
        <button class="btn">APERTE CONFIRMAR NO CELULAR</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    canvas.width = 1280; canvas.height = 720;

    let isPlaying = false;
    let score = 0;
    let speed = 12;
    let obstacles = [];
    const player = { x: 150, y: 500, w: 70, h: 90, dy: 0, gravity: 1.5, jumpForce: 32, onGround: false };

    // ==========================================
    // ESCUTA O CONTROLE (O SEGREDO ESTÁ AQUI)
    // ==========================================
    window.addEventListener('message', (event) => {
        console.log("Comando recebido no jogo:", event.data); // Para teste
        
        if (event.data === 'START') {
            if (!isPlaying) startGame();
        }
        
        if (event.data === 'U') {
            if (isPlaying) jump();
        }
    });

    function jump() {
        if (player.onGround) {
            player.dy = -player.jumpForce;
            player.onGround = false;
        }
    }

    function startGame() {
        score = 0;
        speed = 12;
        obstacles = [];
        isPlaying = true;
        overlay.style.display = 'none';
        requestAnimationFrame(update);
    }

    function gameOver() {
        isPlaying = false;
        overlay.style.display = 'flex';
        document.getElementById('msg').innerText = "GAME OVER! DNA: " + score;
    }

    function update() {
        if (!isPlaying) return;

        // Gravidade
        player.dy += player.gravity;
        player.y += player.dy;

        if (player.y > 600 - player.h) {
            player.y = 600 - player.h;
            player.dy = 0;
            player.onGround = true;
        }

        // Spawn
        if (Math.random() < 0.02) {
            if (obstacles.length === 0 || obstacles[obstacles.length-1].x < 900) {
                obstacles.push({ x: 1300, y: 520, w: 60, h: 80 });
            }
        }

        // Movimento obstáculos
        obstacles.forEach((obs, i) => {
            obs.x -= speed;
            
            // Colisão
            if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
                player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                gameOver();
            }

            if (obs.x + obs.w < 0) {
                obstacles.splice(i, 1);
                score++;
                speed += 0.1;
            }
        });

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = "#0f0524";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Chão
        ctx.fillStyle = "#1a0b3c";
        ctx.fillRect(0, 600, canvas.width, 120);

        // Player
        ctx.fillStyle = "#a2ff00";
        ctx.fillRect(player.x, player.y, player.w, player.h);

        // Obstáculos
        ctx.fillStyle = "#ff00ff";
        obstacles.forEach(obs => ctx.fillRect(obs.x, obs.y, obs.w, obs.h));

        // Score
        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.fillText("DNA: " + score, 50, 50);
    }

    draw(); // Mostra o frame inicial
</script>
</body>
</html>
