<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alien Escape: Auto-Start</title>
    <style>
        :root { --bg: #0f0524; --primary: #a2ff00; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        #game-container { position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/9; background: black; border-radius: 12px; overflow: hidden; border: 2px solid #3d1a6d; }
        canvas { width: 100%; height: 100%; display: block; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 20; }
        .hud { position: absolute; top: 20px; left: 20px; color: var(--primary); font-size: 24px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud" id="score">DNA: 0</div>
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
        <h1 id="msg">CAPTURADO!</h1>
        <p style="color: #a2ff00; margin-top: 10px;">Aperte CONFIRMAR para reiniciar</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const scoreEl = document.getElementById('score');
    canvas.width = 1280; canvas.height = 720;

    let isPlaying = false;
    let score = 0;
    let speed = 12;
    let obstacles = [];
    const player = { x: 150, y: 500, w: 70, h: 90, dy: 0, gravity: 1.5, jumpForce: 32, onGround: false };

    // ==========================================
    // RECEPTOR DE COMANDOS DO CELULAR
    // ==========================================
    window.addEventListener('message', (event) => {
        const cmd = event.data;
        
        // Se receber pulo (U) e estiver jogando, pula
        if (cmd === 'U' && isPlaying) {
            jump();
        }
        
        // Se receber START e estiver no Game Over, reinicia
        if (cmd === 'START' && !isPlaying) {
            startGame();
        }
    });

    function jump() {
        if (player.onGround) {
            player.dy = -player.jumpForce;
            player.onGround = false;
        }
    }

    function startGame() {
        score = 0;
        speed = 12;
        obstacles = [];
        isPlaying = true;
        overlay.style.display = 'none';
        scoreEl.innerText = "DNA: 0";
        update(); // Inicia o loop
    }

    function gameOver() {
        isPlaying = false;
        overlay.style.display = 'flex';
        document.getElementById('msg').innerText = "GAME OVER! DNA: " + score;
    }

    function update() {
        if (!isPlaying) return;

        player.dy += player.gravity;
        player.y += player.dy;

        const groundY = 600;
        if (player.y > groundY - player.h) {
            player.y = groundY - player.h;
            player.dy = 0;
            player.onGround = true;
        }

        // Dificuldade e Spawn
        if (Math.random() < 0.015) {
            if (obstacles.length === 0 || obstacles[obstacles.length-1].x < 850) {
                obstacles.push({ x: 1300, y: groundY - 80, w: 60, h: 80 });
            }
        }

        obstacles.forEach((obs, i) => {
            obs.x -= speed;
            
            // Colisão simplificada
            if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
                player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                gameOver();
            }

            if (obs.x + obs.w < 0) {
                obstacles.splice(i, 1);
                score++;
                scoreEl.innerText = "DNA: " + score;
                speed += 0.1;
            }
        });

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = "#0f0524";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Chão
        ctx.fillStyle = "#1a0b3c";
        ctx.fillRect(0, 600, canvas.width, 120);
        ctx.strokeStyle = "#3d1a6d";
        ctx.lineWidth = 5;
        ctx.strokeRect(0, 600, canvas.width, 5);

        // Player (Alien)
        ctx.fillStyle = "#a2ff00";
        ctx.fillRect(player.x, player.y, player.w, player.h);
        
        // Olhos do Alien
        ctx.fillStyle = "black";
        ctx.fillRect(player.x + 15, player.y + 20, 12, 18);
        ctx.fillRect(player.x + 43, player.y + 20, 12, 18);

        // Obstáculos (Cristais)
        ctx.fillStyle = "#ff00ff";
        obstacles.forEach(obs => {
            ctx.beginPath();
            ctx.moveTo(obs.x, obs.y + obs.h);
            ctx.lineTo(obs.x + obs.w/2, obs.y);
            ctx.lineTo(obs.x + obs.w, obs.y + obs.h);
            ctx.fill();
        });
    }

    // ==========================================
    // O PULO DO GATO: INICIA SOZINHO ASSIM QUE ABRE
    // ==========================================
    startGame();

</script>
</body>
</html>
