<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cine Console - Canal 2</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        video { width: 100vw; height: 100vh; background: #000; }
        #info {
            position: absolute; top: 30px; left: 30px;
            background: rgba(0,0,0,0.7); color: #a2ff00;
            padding: 10px 20px; border-left: 5px solid #a2ff00;
            z-index: 10; font-weight: bold; transition: 0.5s;
        }
    </style>
</head>
<body>

    <div id="info">CANAL 02: CINEMA AO VIVO</div>
    <video id="video" autoplay></video>

    <script>
        const video = document.getElementById('video');
        // Link de um canal de filmes gratuito (HLS público)
        const videoSrc = 'https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8';

        // Configuração do Player
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }

        // Faz o aviso sumir
        setTimeout(() => { document.getElementById('info').style.opacity = '0'; }, 4000);

        // ==========================================
        // CONTROLE REAL PELO CELULAR
        // ==========================================
        window.addEventListener('message', (event) => {
            const cmd = event.data;
            
            if (cmd === 'U') video.volume = Math.min(1, video.volume + 0.1); // Cima = Aumenta Volume
            if (cmd === 'D') video.volume = Math.max(0, video.volume - 0.1); // Baixo = Abaixa Volume
            if (cmd === 'L') video.currentTime -= 10; // Esquerda = Volta 10s
            if (cmd === 'R') video.currentTime += 10; // Direita = Adianta 10s
            
            if (cmd === 'START') { // Confirmar = Play/Pause
                if (video.paused) video.play();
                else video.pause();
            }
        });

        // Tira o mudo caso o navegador bloqueie o som no início
        document.body.onclick = () => { video.muted = false; video.play(); };
    </script>
</body>
</html>
