<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pluto TV - Modo Console</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; height: 100vh; width: 100vw; }
        #pluto-container { width: 100%; height: 100%; border: none; }
        iframe { width: 100%; height: 100%; border: none; }
        #overlay-hint {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.6); color: #00ff00;
            padding: 5px 15px; border-radius: 20px; font-family: sans-serif;
            font-size: 12px; pointer-events: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="overlay-hint">CONTROLE REMOTO ATIVO</div>

    <div id="pluto-container">
        <iframe 
            id="pluto-frame"
            src="https://pluto.tv/br/live-tv" 
            allow="autoplay; fullscreen"
            sandbox="allow-forms allow-scripts allow-pointer-lock allow-same-origin">
        </iframe>
    </div>

    <script>
        const iframe = document.getElementById('pluto-frame');

        // ==========================================
        // SISTEMA DE REPASSE DE TECLAS (REMOTE CONTROL)
        // ==========================================
        window.addEventListener('message', (event) => {
            const data = event.data;
            console.log("Comando recebido na TV:", data);

            // Mapeamento de comandos para Teclas Reais do Teclado
            const keyMap = {
                'U': { key: 'ArrowUp', code: 'ArrowUp', keyCode: 38 },
                'D': { key: 'ArrowDown', code: 'ArrowDown', keyCode: 40 },
                'L': { key: 'ArrowLeft', code: 'ArrowLeft', keyCode: 37 },
                'R': { key: 'ArrowRight', code: 'ArrowRight', keyCode: 39 },
                'START': { key: 'Enter', code: 'Enter', keyCode: 13 }
            };

            const keyData = keyMap[data];

            if (keyData) {
                // Tentativa 1: Disparar na janela principal
                const eventObj = new KeyboardEvent('keydown', {
                    key: keyData.key,
                    code: keyData.code,
                    keyCode: keyData.keyCode,
                    which: keyData.keyCode,
                    bubbles: true,
                    cancelable: true
                });
                
                window.dispatchEvent(eventObj);
                document.dispatchEvent(eventObj);

                // Tentativa 2: Tentar focar no iframe para ele receber a tecla
                iframe.focus();
            }
        });

        // Truque: Clique automático para ganhar foco ao carregar
        document.body.addEventListener('mouseover', () => {
            iframe.focus();
        });
    </script>
</body>
</html>
