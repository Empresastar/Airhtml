<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Spark Console | TV Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Outfit', sans-serif; overflow: hidden; }
        .game-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 4px solid #1e293b; }
        .game-card.selected { border-color: #fbbf24; transform: scale(1.1); box-shadow: 0 0 40px rgba(251, 191, 36, 0.3); }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        /* Dino Estilo Google */
        #dino { position: absolute; bottom: 0; left: 50px; font-size: 50px; transition: bottom 0.3s cubic-bezier(0.1, 0.7, 1, 0.1); }
        .cactus { position: absolute; bottom: 0; right: -50px; font-size: 40px; }
    </style>
</head>
<body>

    <div id="scr-login" class="screen active">
        <h1 class="text-5xl font-black text-amber-500 mb-10 italic text-white">SPARK CONSOLE</h1>
        <div id="pin-display" class="text-7xl font-black text-white bg-slate-900 p-8 rounded-3xl border-2 border-slate-700">----</div>
    </div>

    <div id="scr-hub" class="screen bg-slate-900">
        <h2 class="text-3xl font-black mb-16 uppercase italic">Menu de Jogos</h2>
        <div class="flex space-x-10">
            <div id="g-0" class="game-card selected bg-slate-800 p-10 rounded-[2.5rem] text-center w-64">
                <i class="fas fa-dragon text-6xl text-green-500 mb-4"></i>
                <h3 class="font-black">DINO RUN</h3>
            </div>
            <div id="g-1" class="game-card bg-slate-800 p-10 rounded-[2.5rem] text-center w-64 opacity-50">
                <i class="fas fa-rocket text-6xl text-blue-500 mb-4"></i>
                <h3 class="font-black">SPACE WAR</h3>
            </div>
        </div>
    </div>

    <div id="scr-dino" class="screen bg-white text-slate-800">
        <div class="absolute top-10 right-10 text-2xl font-bold">Score: <span id="score">0</span></div>
        <div class="relative w-[800px] h-[200px] border-b-4 border-slate-800">
            <div id="dino"><i class="fas fa-dragon"></i></div>
            <div id="cactus-container"></div>
        </div>
    </div>

    <script>
        const pin = Math.floor(1000 + Math.random() * 9000).toString();
        const peer = new Peer('spark-hub-' + pin);
        let conn, menuIndex = 0, score = 0, isJumping = false, gameActive = false;

        peer.on('open', () => document.getElementById('pin-display').innerText = pin);
        peer.on('connection', c => {
            conn = c; setScreen('scr-hub');
            conn.on('data', data => {
                if(data.type === 'NAV') handleNav(data.dir);
                if(data.type === 'START') startGame();
                if(data.type === 'BACK') backToMenu();
                if(data.type === 'ACTION' && data.cmd === 'jump') dinoJump();
            });
        });

        function handleNav(dir) {
            document.getElementById(`g-${menuIndex}`).classList.remove('selected', 'opacity-100');
            document.getElementById(`g-${menuIndex}`).classList.add('opacity-50');
            menuIndex = dir === 'right' ? 1 : 0;
            document.getElementById(`g-${menuIndex}`).classList.add('selected', 'opacity-100');
        }

        function startGame() {
            setScreen(menuIndex === 0 ? 'scr-dino' : 'scr-space');
            conn.send({ type: 'INIT_GAME', game: menuIndex === 0 ? 'DINO' : 'SPACE' });
            if(menuIndex === 0) startDinoGame();
        }

        function backToMenu() {
            gameActive = false;
            setScreen('scr-hub');
            conn.send({ type: 'INIT_GAME', game: 'HUB' });
        }

        function startDinoGame() {
            gameActive = true; score = 0;
            const loop = setInterval(() => {
                if(!gameActive) { clearInterval(loop); return; }
                score++; document.getElementById('score').innerText = score;
                spawnCactus();
            }, 2000);
        }

        function dinoJump() {
            if(isJumping) return;
            isJumping = true;
            const d = document.getElementById('dino');
            d.style.bottom = '100px';
            setTimeout(() => { d.style.bottom = '0'; isJumping = false; }, 400);
        }

        function spawnCactus() {
            const c = document.createElement('div');
            c.className = 'cactus';
            c.innerHTML = '<i class="fas fa-seedling text-green-700"></i>';
            document.getElementById('cactus-container').appendChild(c);
            let pos = -50;
            const move = setInterval(() => {
                pos += 10; c.style.right = pos + 'px';
                if(pos > 850) { clearInterval(move); c.remove(); }
            }, 30;
        }

        function setScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
