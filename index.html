<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirConsole - Início</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white h-screen flex flex-col items-center justify-center p-6 font-sans">
    <h1 class="text-5xl font-black mb-12 italic tracking-tighter text-sky-500">AIR<span class="text-white">CONSOLE</span></h1>
    <div class="flex flex-col md:flex-row gap-8">
        <button onclick="window.location.href='console.html'" class="p-10 bg-slate-900 border-2 border-slate-800 rounded-[2.5rem] hover:border-sky-500 transition-all text-center">
            <div class="text-5xl mb-4">📺</div>
            <div class="font-bold text-xl">MODO TV / PC</div>
            <p class="text-slate-500 text-sm mt-2">Onde os jogos passam</p>
        </button>
        <button onclick="window.location.href='mobile.html'" class="p-10 bg-slate-900 border-2 border-slate-800 rounded-[2.5rem] hover:border-sky-500 transition-all text-center">
            <div class="text-5xl mb-4">📱</div>
            <div class="font-bold text-xl">MODO CONTROLE</div>
            <p class="text-slate-500 text-sm mt-2">Use para jogar</p>
        </button>
    </div>
</body>
</html>
