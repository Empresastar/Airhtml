<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Spark Console | TV Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Outfit', sans-serif; overflow: hidden; }
        .game-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 4px solid #1e293b; }
        .game-card.selected { border-color: #fbbf24; transform: scale(1.1); box-shadow: 0 0 40px rgba(251, 191, 36, 0.3); }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        #runner { transition: transform 0.2s; position: absolute; bottom: 100px; left: 100px; }
        .sprite { position: absolute; transition: all 0.1s linear; }
    </style>
</head>
<body>

    <div id="scr-login" class="screen active">
        <h1 class="text-5xl font-black text-amber-500 mb-10 italic">SPARK CONSOLE</h1>
        <div class="bg-slate-900 p-10 rounded-[3rem] border-2 border-slate-800 text-center">
            <p class="text-slate-500 font-bold uppercase tracking-widest mb-2">Código da Sala</p>
            <div id="pin-display" class="text-7xl font-black tracking-tighter italic text-white">----</div>
        </div>
    </div>

    <div id="scr-hub" class="screen bg-slate-900">
        <h2 class="text-3xl font-black mb-16 uppercase tracking-tighter italic">Meus Jogos</h2>
        <div class="flex space-x-10">
            <div id="g-0" class="game-card selected bg-slate-800 p-10 rounded-[2.5rem] text-center w-64">
                <i class="fas fa-person-running text-6xl text-amber-500 mb-4"></i>
                <h3 class="font-black">SILLY RUN</h3>
            </div>
            <div id="g-1" class="game-card bg-slate-800 p-10 rounded-[2.5rem] text-center w-64 opacity-50">
                <i class="fas fa-rocket text-6xl text-blue-500 mb-4"></i>
                <h3 class="font-black text-xl">SPACE WAR</h3>
            </div>
            <div id="g-2" class="game-card bg-slate-800 p-10 rounded-[2.5rem] text-center w-64 opacity-50">
                <i class="fas fa-lightbulb text-6xl text-green-500 mb-4"></i>
                <h3 class="font-black text-xl">BRAIN QUIZ</h3>
            </div>
        </div>
    </div>

    <div id="scr-run" class="screen bg-gradient-to-b from-blue-900 to-black">
        <div id="runner" class="text-7xl"><i class="fas fa-child"></i></div>
        <div class="w-full h-2 bg-slate-700 absolute bottom-[100px]"></div>
    </div>

    <div id="scr-space" class="screen bg-black">
        <div id="ship" class="sprite text-5xl text-blue-400 rotate-90"><i class="fas fa-rocket"></i></div>
    </div>

    <div id="scr-quiz" class="screen bg-indigo-950">
        <h2 class="text-4xl font-black mb-12">Quanto é 5 x 5?</h2>
        <div class="grid grid-cols-2 gap-4 w-full max-w-2xl px-10">
            <div class="bg-red-500 p-6 rounded-2xl text-2xl font-bold">A) 15</div>
            <div class="bg-blue-500 p-6 rounded-2xl text-2xl font-bold">B) 25</div>
            <div class="bg-green-500 p-6 rounded-2xl text-2xl font-bold">C) 50</div>
            <div class="bg-yellow-500 p-6 rounded-2xl text-2xl font-bold">D) 55</div>
        </div>
    </div>

    <script>
        const pin = Math.floor(1000 + Math.random() * 9000).toString();
        const peer = new Peer('spark-hub-' + pin);
        let conn;
        let menuIndex = 0;
        let shipPos = { x: 50, y: 50 };

        peer.on('open', () => document.getElementById('pin-display').innerText = pin);

        peer.on('connection', c => {
            conn = c;
            setScreen('scr-hub');
            conn.on('data', data => {
                if(data.type === 'NAV') handleNav(data.dir);
                if(data.type === 'START') startGame();
                if(data.type === 'ACTION') handleAction(data.cmd);
            });
        });

        function handleNav(dir) {
            document.getElementById(`g-${menuIndex}`).classList.remove('selected', 'opacity-100');
            document.getElementById(`g-${menuIndex}`).classList.add('opacity-50');
            menuIndex = dir === 'right' ? (menuIndex + 1) % 3 : (menuIndex - 1 + 3) % 3;
            document.getElementById(`g-${menuIndex}`).classList.add('selected', 'opacity-100');
            document.getElementById(`g-${menuIndex}`).classList.remove('opacity-50');
        }

        function startGame() {
            const games = ['RUN', 'SPACE', 'QUIZ'];
            const game = games[menuIndex];
            setScreen('scr-' + game.toLowerCase());
            conn.send({ type: 'INIT_GAME', game: game });
            if(game === 'SPACE') updateShip();
        }

        function handleAction(cmd) {
            if(cmd === 'jump') {
                const r = document.getElementById('runner');
                r.style.transform = 'translateY(-150px)';
                setTimeout(() => r.style.transform = 'translateY(0)', 300);
            }
            if(['up', 'down', 'left', 'right'].includes(cmd)) {
                if(cmd === 'up') shipPos.y -= 5;
                if(cmd === 'down') shipPos.y += 5;
                if(cmd === 'left') shipPos.x -= 5;
                if(cmd === 'right') shipPos.x += 5;
                updateShip();
            }
        }

        function updateShip() {
            const s = document.getElementById('ship');
            if(s) {
                s.style.top = shipPos.y + '%';
                s.style.left = shipPos.x + '%';
            }
        }

        function setScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
